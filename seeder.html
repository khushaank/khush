<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Database Seeder - Massive Content</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 2rem;
        line-height: 1.5;
        max-width: 800px;
        margin: 0 auto;
      }
      .log {
        background: #f4f4f4;
        padding: 1rem;
        border-radius: 8px;
        font-family: monospace;
        white-space: pre-wrap;
        height: 400px;
        overflow-y: auto;
        border: 1px solid #ddd;
      }
      .success {
        color: green;
      }
      .error {
        color: red;
        font-weight: bold;
      }
      .btn {
        padding: 10px 20px;
        background: #000;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
        margin-bottom: 1rem;
      }
      .btn:disabled {
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <h1>Database Content Reset & Seed</h1>
    <p>
      This will <strong>DELETE ALL</strong> existing posts and comments, then
      insert 6 massive, "4-page" style articles with YouTube embeds and images.
    </p>

    <button id="seedBtn" class="btn" onclick="runSeeder()">Run Seeder</button>

    <div id="log" class="log">Ready to seed...</div>

    <script>
      const log = document.getElementById("log");
      function print(msg, type = "info") {
        const div = document.createElement("div");
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        if (type === "error") div.className = "error";
        if (type === "success") div.className = "success";
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
      }

      const SUPABASE_URL = "https://hzxwqxmldlncrhqxlnlq.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6eHdxeG1sZGxuY3JocXhsbmxxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxODIwMDEsImV4cCI6MjA4NTc1ODAwMX0.pP3i8KquZmqhiUkaTw3ROi86mslTyzK5ysD2va1JI10";

      const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // --- Content Generators ---

      const topics = [
        "The Future of Algorithmic Trading",
        "Deep Dive into Corporate Forensic Accounting",
        "Global Economic Shifts in 2026",
        "The Architecture of Modern FinTech Applications",
        "Sustainable Investing: ESG Frameworks Analysis",
        "Blockchain's Role in Next-Gen Auditing",
      ];

      const youtubeIds = [
        "JjwxxL7C-8U", // Generic Tech
        "oHGK85-r3Xo", // Audit proper
        "CalculatedRisk", // Placeholder ID
        "2e9rR-8g-4A", // Tax
        "Ay-zJ6zO2oQ",
        "ysz5S6PUM-U",
      ];

      const contentFiller = [
        "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.",
        "Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.",
        "Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium, totam rem aperiam, eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo.",
        "At vero eos et accusamus et iusto odio dignissimos ducimus qui blanditiis praesentium voluptatum deleniti atque corrupti quos dolores et quas molestias excepturi sint occaecati cupiditate non provident.",
        "Analysis of the market trends suggests a significant shift in consumer behavior. This paradigm shift requires a robust re-evaluation of traditional business models.",
      ];

      function getRandomImage() {
        const keywords = [
          "finance",
          "technology",
          "office",
          "meeting",
          "chart",
          "money",
          "audit",
          "code",
        ];
        const keyword = keywords[Math.floor(Math.random() * keywords.length)];
        return `https://images.unsplash.com/photo-${Math.floor(Math.random() * 100000)}?auto=format&fit=crop&q=80&w=1200&h=600&keyword=${keyword}`; // Using a generic structure, but let's use reliable logical ones below
      }

      const realImages = [
        "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=1200",
        "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=1200",
        "https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?auto=format&fit=crop&w=1200",
        "https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?auto=format&fit=crop&w=1200",
        "https://images.unsplash.com/photo-1563986768609-322da13575f3?auto=format&fit=crop&w=1200",
        "https://images.unsplash.com/photo-1611974765270-ca1258634369?auto=format&fit=crop&w=1200",
      ];

      function generateHugeContent(title, index) {
        let html = `<p class="lead">An extensive analysis of <strong>${title}</strong>, exploring its nuances, implications, and future outlook in the modern landscape.</p>`;
        html += `<hr style="margin: 2rem 0;">`;

        // Generate 5 main sections
        for (let i = 1; i <= 5; i++) {
          html += `<h2>${i}. Comprehensive Analysis: Section ${i}</h2>`;

          // Paragraphs
          for (let p = 0; p < 4; p++) {
            html += `<p>${contentFiller[Math.floor(Math.random() * contentFiller.length)]} ${contentFiller[Math.floor(Math.random() * contentFiller.length)]}</p>`;
          }

          // Bullet points
          html += `<ul>`;
          for (let l = 0; l < 4; l++) {
            html += `<li><strong>Key Point ${i}.${l + 1}:</strong> ${contentFiller[0].substring(0, 50)}...</li>`;
          }
          html += `</ul>`;

          // Randomly insert Media (Video or Image) per section
          if (i === 2 || i === 4) {
            // Image
            html += `<figure style="margin: 2rem 0;">
                <img src="${realImages[(index + i) % realImages.length]}" alt="Section Image" style="width:100%; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <figcaption style="text-align:center; color:#666; margin-top:0.5rem; font-style:italic;">Figure ${i}: Data Visualization and Market Trends</figcaption>
             </figure>`;
          }

          if (i === 3) {
            // Youtube
            const vidId = youtubeIds[index % youtubeIds.length];
            html += `<div style="margin: 2rem 0; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px;">
              <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border:0;" 
              src="https://www.youtube.com/embed/${vidId}" 
              title="YouTube video player" 
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>`;
          }

          // More texgt
          for (let p = 0; p < 3; p++) {
            html += `<p>${contentFiller[Math.floor(Math.random() * contentFiller.length)]}</p>`;
          }
        }

        // Conclusion
        html += `<h3>Conclusion and Strategic Outlook</h3>`;
        html += `<p>${contentFiller[4]} ${contentFiller[0]}</p>`;
        html += `<blockquote style="border-left: 4px solid #000; padding-left: 1rem; margin: 2rem 0; font-style: italic;">"The future belongs to those who prepare for it today."</blockquote>`;

        return html;
      }

      async function runSeeder() {
        const btn = document.getElementById("seedBtn");
        btn.disabled = true;
        btn.textContent = "Running...";

        try {
          // 1. Delete All Existing
          print("Step 1: Deleting ALL existing posts...");

          // To delete all, we need a condition that matches all. ID > 0 is usually safe.
          const { error: delError } = await sbClient
            .from("posts")
            .delete()
            .gt("id", "00000000-0000-0000-0000-000000000000"); // Assuming UUID, but if INT use 0. Supabase "posts" usually UUID?

          // If the above fails due to type mismatch (if id is int), try a different method or just list them first.
          // Let's safe fetch list first to be sure.
          const { data: existing, error: listError } = await sbClient
            .from("posts")
            .select("id");

          if (existing && existing.length > 0) {
            const ids = existing.map((x) => x.id);
            const { error: batchDelError } = await sbClient
              .from("posts")
              .delete()
              .in("id", ids);
            if (batchDelError) throw batchDelError;
          }

          print("Deletion complete.", "success");

          // 2. Insert New Posts
          print("Step 2: Generating 6 Massive Posts...");

          for (let i = 0; i < topics.length; i++) {
            const title = topics[i];
            const content = generateHugeContent(title, i);
            const slug = title
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, "-")
              .replace(/(^-|-$)/g, "");

            print(`Creating Post ${i + 1}: ${title}...`);

            const { error: insError } = await sbClient.from("posts").insert([
              {
                title: title,
                slug: slug,
                excerpt: `An executive summary of ${title} regarding financial implications in the coming fiscal year.`,
                content: content,
                image_url: realImages[i],
                views: Math.floor(Math.random() * 500) + 100, // Make them look popular
                created_at: new Date(
                  Date.now() - Math.floor(Math.random() * 1000000000),
                ).toISOString(), // Random past date
              },
            ]);

            if (insError) throw insError;
          }

          print("All 6 posts created successfully!", "success");
          print("DONE. You can close this page.", "success");
        } catch (err) {
          print(`FATAL ERROR: ${err.message}`, "error");
          console.error(err);
        } finally {
          btn.disabled = false;
          btn.textContent = "Run Seeder Again";
        }
      }
    </script>
  </body>
</html>
